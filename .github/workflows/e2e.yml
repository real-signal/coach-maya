name: e2e

# Runs e2e click-throughs against whichever URL Vercel just deployed.
# Vercel posts a deployment_status event to GitHub when each deploy finishes;
# we hook into the "success" state and fan out one job per test (parallel,
# isolated failures, individual red ❌ checks).
on:
  deployment_status:

jobs:
  e2e:
    if: >-
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment_url, 'vercel.app')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        test:
          - onboarding
          - dashboard
          - routes
          - draft
    name: e2e (${{ matrix.test }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run e2e:${{ matrix.test }} against deploy
        env:
          URL: ${{ github.event.deployment_status.environment_url }}
          CHROME: /usr/bin/google-chrome
        run: npm run e2e:${{ matrix.test }}
